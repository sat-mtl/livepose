name: Build LivePose

on:
  push:
    branches: [ main, master, dev, develop ]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Package Custom App - ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            artifact-name: linux-x86_64
          - os: macos-latest
            platform: macos-arm
            artifact-name: macos-arm
          - os: windows-latest
            platform: windows
            artifact-name: windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Build ossia score from the pose-detector branch (PR ossia/score#2068).
      # Its ci/common.deps.sh clones score-addon-onnx and checks out its
      # feature/detector branch (PR ossia/score-addon-onnx#29), which adds the
      # Detection Model / Track ROI / Smoothing ports used by RunView.qml.
      # Once #2068 is merged into continuous, drop this step and restore
      # `release-tag: "continuous"` on the package step below.
      - name: Build ossia score (pose-detector branch)
        id: score
        uses: ossia/actions/custom-score-build@master
        with:
          score-repo: "ossia/score"
          score-ref: "feature/detector"
          cmake-options: "-DSCORE_ENABLE_ADDONS=score-addon-onnx"
          target-arch: ${{ matrix.target-arch || '' }}
          macos-certificate-base64: ${{ secrets.MAC_CERT_B64 }}
          macos-certificate-password: ${{ secrets.MAC_CERT_PASSWORD }}
          macos-notarize-team-id: ${{ secrets.MAC_NOTARIZE_TEAM_ID }}
          macos-notarize-apple-id: ${{ secrets.MAC_NOTARIZE_APPLE_ID }}
          macos-notarize-password: ${{ secrets.MAC_NOTARIZE_PASSWORD }}

      - name: Package custom ossia score app
        uses: ossia/actions/package-custom-app@master
        with:
          app-name: "LivePose"
          qml-files: "qml"
          # Optional: Add your score file here
          score-file: "score/app.score"
          # Use the score build produced above instead of a published SDK.
          score-build-id: ${{ steps.score.outputs.artifact-id }}
          platforms: "${{ matrix.platform }}"
          # App metadata
          app-organization: "SAT"
          app-domain: "sat.qc.ca"
          app-environment: environment
          app-identifier: "ca.qc.sat.livepose"
          app-description: "pose and blob detection software"
          app-copyright: "Société des Arts Technologiques"
          app-version: "1.0"
          app-png: "qml/livepose/resources/images/LivePose_logo.png"
          app-ico: "qml/livepose/resources/images/LivePose_logo.ico"
          app-icns: "qml/livepose/resources/images/LivePose_logo.icns"
          # Optional: macOS code signing (requires secrets to be set in repository)
          macos-certificate-base64: ${{ secrets.MAC_CERT_B64 }}
          macos-certificate-password: ${{ secrets.MAC_CERT_PASSWORD }}
          macos-notarize-team-id: ${{ secrets.MAC_NOTARIZE_TEAM_ID }}
          macos-notarize-apple-id: ${{ secrets.MAC_NOTARIZE_APPLE_ID }}
          macos-notarize-password: ${{ secrets.MAC_NOTARIZE_PASSWORD }}

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: livepose-${{ matrix.artifact-name }}
          path: packages/
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-packages
          pattern: livepose-*
          merge-multiple: true

      - name: Create Release (on tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: all-packages/*
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Upload to Continuous Release (on main/master)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          name: "Continuous Build"
          tag_name: "continuous"
          files: all-packages/*
          draft: false
          prerelease: true
          generate_release_notes: false
